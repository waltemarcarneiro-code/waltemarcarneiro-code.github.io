<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="theme-color" content="#ffffff">
  <meta name="apple-mobile-web-app-status-bar-style" content="light">
  <link rel="icon" type="image/x-icon" href="icons/favicon_32x32.ico">
  <title>LovePlayer</title>

  <link rel="stylesheet" href="styles.css">
</head>
<body>

<div class="layout">

  <!-- ESQUERDA -->
  <section class="section section--primary">
    <div class="content">
      <h1>Vídeos</h1>
    </div>
  </section>

  <!-- DIREITA -->
  <section class="section section--secondary">

    <!-- HEADER -->
    <header class="section-header">
      <span>LovePlayer</span>

      <div class="header-actions">
        <img src="icons/share.svg" alt="compartilhar" title="Compartilhar" id="share">
        <img src="icons/heart.svg" alt="favoritar" title="Favoritar" id="favoriteIcon">
        <img src="icons/playlist.svg" alt="playlists" title="Playlists" id="playlistIcon">
        <img src="icons/search.svg" alt="buscar" title="Buscar" id="searchIcon">

        <img src="icons/more.svg" id="openModal">
      </div>
    </header>

    <!-- INFO -->
    <div class="section-info">
      <div class="media-info">
        <h2>Nome da Música</h2>
        <p>Artista</p>
      </div>
    </div>

    <!-- CONTROLES -->
    <footer class="section-controls">

      <div class="progress">
        <input type="range">
      </div>

      <div class="controls">
        <img src="icons/shuffle.svg">

        <img src="icons/prev.svg">
        
        <button class="play">
          <img src="icons/play.svg">
        </button>
        
        <img src="icons/next.svg">

        <img src="icons/repeat.svg">
      </div>

    </footer>

  </section>

</div>

<!-- MODAL -->
<div class="modal" id="modal">

  <div class="modal-header">
    <span>Menu</span>
    <img src="icons/close.svg" id="closeModal">
  </div>

  <div class="modal-list">
    <div class="modal-item" id="toggleTheme"><img src="icons/theme.svg">Tema Dark/Light</div>
    <div class="modal-item" id="showFavoritesMenu"><img src="icons/heart.svg">Meus Favoritos</div>
    <div class="modal-item"><img src="icons/login.svg">Login</div>
    <div class="modal-item"><img src="icons/bkp.svg">Fazer Backup</div>
    <div class="modal-item"><img src="icons/share.svg">Compartilhe App</div>
    <div class="modal-item"><img src="icons/arrow.svg">Política de Privacidade</div>
    <div class="modal-item"><img src="icons/arrow.svg">Termo de Serviço</div>
    <div class="modal-item"><img src="icons/arrow.svg">Sobre</div>
    <div class="modal-item"><img src="icons/donate.svg">Doação</div>
  </div>

</div>

<!-- Modal Bottom para Playlists -->
<div id="playlistModal" class="playlist-modal">
  <div class="modal-header">
    <span>Minhas Playlists</span>
    <img src="icons/close.svg" id="closePlaylistModal">
  </div>
  <div id="playlistList" class="playlist-grid"></div>
</div>

<!-- Overlay para fechar o modal -->
<div id="playlistOverlay" class="playlist-overlay"></div>

<!-- Modal Bottom para Favoritos -->
<div id="favoritesModal" class="playlist-modal">
  <div class="modal-header">
    <span>Vídeos Favoritados</span>
    <img src="icons/close.svg" id="closeFavoritesModal">
  </div>
  <div id="favoritesList" class="video-grid"></div>
</div>

<!-- Overlay para Favoritos -->
<div id="favoritesOverlay" class="playlist-overlay"></div>

<!-- Modal Bottom para Busca -->
<div id="searchModal" class="playlist-modal">
  <div class="modal-header">
    <input type="text" id="searchInput" placeholder="Buscar vídeos..." class="search-input">
  </div>
  <div id="searchResults" class="video-grid"></div>
</div>

<!-- Overlay para Busca -->
<div id="searchOverlay" class="playlist-overlay"></div>

<!-- Feedback Bottom Sheet -->
<div id="feedbackModal" class="feedback-modal">
  <div class="feedback-content">
    <img id="feedbackIcon" src="icons/play.svg" alt="feedback">
    <span id="feedbackMessage">Mensagem de feedback</span>
  </div>
</div>

<script src="app.js"></script>

</body>
</html>
